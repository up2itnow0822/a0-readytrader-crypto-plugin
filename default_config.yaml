# ReadyTrader Crypto — Default Configuration

# MCP server connection
mcp_server_url: "http://localhost:8000"

# Timeout for MCP HTTP calls (seconds)
mcp_request_timeout: 30

# Trading mode: paper (simulated) or live
trading_mode: "paper"

# Default exchange for price data (allow-list: binance, coinbase, kraken, okx, bybit)
default_exchange: "binance"

# Paper trading starting balance (USD)
paper_starting_balance: 10000.0

# Risk limits
max_position_size_usd: 1000.0
max_portfolio_risk_pct: 5.0
stop_loss_pct: 2.0

# Default timeframe for OHLCV data
default_timeframe: "1h"

# API keys (set via environment variables — never paste keys here)
exchange_api_key_env: "EXCHANGE_API_KEY"
exchange_api_secret_env: "EXCHANGE_API_SECRET"
